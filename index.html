<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GREEN | The Best Tree's Shop In Town</title>

    <!-- CSS link -->

    <link rel="stylesheet" href="./style/style.css">

    <!-- Tailwind & DaisyUI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font - Inter  -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">


</head>

<body>

    <main class="container mx-auto pt-4 w-11/12 space-y-4 pb-8">
        <h2 class="text-[#4ade80] font-bold text-4xl text-center">Choose Your Trees</h2>

        <div class="grid grid-cols-12 gap-8 mx-auto">

            <!-- Categories -->
            <div class="bg-white card card-body shadow-xl rounded-md col-span-3 space-y-3">
                <h2 class="font-bold text-2xl text-center mx-auto">Categories</h2>
                <div>
                    <button id="allTreesBtn" class="btn btn-success w-full mb-4">All Trees</button>

                    <!-- Categories Container -->

                    <div id="categoriesContainer" class="space-y-4">
                        <!-- Categories will be dynamically loaded here by JS -->

                    </div>
                </div>
            </div>

            <!-- Trees -->
            <div class="bg-white card card-body shadow-xl rounded-md col-span-6">
                    <!-- Trees rendered -->

                <div id="treesContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-5">

                    <!-- dynamically append here -->
                    
                </div>
                        <!-- Loading spinner -->

                    <div id="loadingSpinner" class="h-[60vh] flex justify-center items-center hidden">

                        <span class="loading loading-spinner text-success"></span>
                    
                    </div>

            </div>

            <!-- Cards -->
            <div class="bg-white card card-body shadow-xl rounded-md col-span-3 text-center">
                <h2 class="font-bold text-2xl">Cart</h2>
            </div>

        </div>

    </main>

    <!-- Linkage JS -->
    <script src="./script/index.js"></script>
</body>

</html>
